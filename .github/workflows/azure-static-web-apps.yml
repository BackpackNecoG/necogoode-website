name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install + build (frontend)
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      # Backend deps install at deploy-time inside Oryx; we don't pre-build it.
      - name: Install (backend)
        working-directory: api
        run: npm ci --no-audit --no-fund

      - name: Deploy to Azure Static Web Apps
        id: swa-deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # AZURE_STATIC_WEB_APPS_API_TOKEN is provisioned by `az staticwebapp create`
          # and stored as a GitHub repo secret automatically when Azure connects to the repo.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # Where the SWA action looks for built output / functions
          app_location: 'web/dist'
          api_location: 'api'
          output_location: ''           # web/dist is already the built output
          skip_app_build: true          # we built above; don't double-build
          skip_api_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request
    steps:
      - name: Close PR preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
