<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img"
     aria-label="PIP factory floor is Claude Code — filesystem-as-factory and genuine session isolation across five mandatory reviews. Concept render.">
  <defs>
    <style>
      .ink{font-family:'Courier New',ui-monospace,monospace;}
      .glow{filter:drop-shadow(0 0 6px rgba(227,179,65,.35));}
    </style>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E3B341" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1018"/>
      <stop offset="1" stop-color="#070A10"/>
    </linearGradient>
    <marker id="arrow4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E3B341"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg4)"/>
  <rect width="1600" height="1000" fill="url(#grid4)"/>
  <rect x="20" y="20" width="1560" height="960" fill="none" stroke="#E3B341" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="932" fill="none" stroke="#E3B341" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 6"/>

  <text class="ink" x="800" y="560" text-anchor="middle" transform="rotate(-18 800 560)"
        font-size="190" font-weight="700" fill="#E3B341" fill-opacity="0.05" letter-spacing="22">IN FAB</text>

  <text class="ink" x="60" y="92" font-size="34" font-weight="700" fill="#E3B341" letter-spacing="4">PIP — PRIMITIVE INFRASTRUCTURE PLATFORM</text>
  <text class="ink" x="62" y="124" font-size="18" fill="#9A7B2E" letter-spacing="3">U5 · BUS-16 · THE FACTORY FLOOR IS CLAUDE CODE</text>
  <line x1="60" y1="142" x2="1540" y2="142" stroke="#E3B341" stroke-opacity="0.25" stroke-width="1"/>

  <!-- filesystem as factory: folder tree -->
  <g class="glow">
    <rect x="80" y="200" width="560" height="600" rx="10" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.7" stroke-width="2"/>
  </g>
  <text class="ink" x="110" y="248" font-size="22" font-weight="700" fill="#F0CD66" letter-spacing="2">FILESYSTEM-AS-FACTORY</text>
  <text class="ink" x="110" y="276" font-size="14" fill="#B8902F">structured source-of-truth documents</text>
  <line x1="110" y1="296" x2="610" y2="296" stroke="#E3B341" stroke-opacity="0.3"/>

  <g class="ink" font-size="18" fill="#A8862E">
    <text x="120" y="340">📁 /pip</text>
    <text x="160" y="376">📁 registry</text>
    <text x="200" y="412" fill="#F0CD66">📄 PIP-TEXT-001-V1.md</text>
    <text x="200" y="446" fill="#F0CD66">📄 PIP-DATA-014-V2.md</text>
    <text x="200" y="480" fill="#F0CD66">📄 PIP-COMM-007-V1.md</text>
    <text x="160" y="520">📁 protocol</text>
    <text x="200" y="554" fill="#F0CD66">📄 PSP-SPEC.md</text>
    <text x="160" y="594">📁 reviews</text>
    <text x="200" y="628" fill="#C9A23B">📄 session-1 · session-2</text>
    <text x="200" y="662" fill="#C9A23B">📄 session-3 · session-4</text>
    <text x="200" y="696" fill="#C9A23B">📄 session-5</text>
  </g>
  <text class="ink" x="110" y="752" font-size="14" fill="#8A7333">the folder tree is the factory —</text>
  <text class="ink" x="110" y="774" font-size="14" fill="#8A7333">filesystem access for the documents</text>

  <!-- genuine session isolation: independent inspectors -->
  <text class="ink" x="720" y="240" font-size="22" font-weight="700" fill="#E3B341" letter-spacing="3">GENUINE SESSION ISOLATION</text>
  <text class="ink" x="722" y="266" font-size="14" fill="#B8902F">the sessions are independent inspectors · no shared context</text>

  <g class="ink">
    <!-- five inspector sessions, each separate -->
    <g>
      <rect x="720" y="300" width="370" height="86" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="744" y="334" font-size="17" font-weight="700" fill="#F0CD66">REVIEW SESSION 1</text>
      <text x="744" y="362" font-size="13" fill="#8A7333">separate session · no shared context</text>
      <text x="1066" y="350" text-anchor="end" font-size="20" fill="#E3B341">✓</text>
    </g>
    <g>
      <rect x="720" y="396" width="370" height="86" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="744" y="430" font-size="17" font-weight="700" fill="#F0CD66">REVIEW SESSION 2</text>
      <text x="744" y="458" font-size="13" fill="#8A7333">separate session · no shared context</text>
      <text x="1066" y="446" text-anchor="end" font-size="20" fill="#E3B341">✓</text>
    </g>
    <g>
      <rect x="720" y="492" width="370" height="86" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="744" y="526" font-size="17" font-weight="700" fill="#F0CD66">REVIEW SESSION 3</text>
      <text x="744" y="554" font-size="13" fill="#8A7333">separate session · no shared context</text>
      <text x="1066" y="542" text-anchor="end" font-size="20" fill="#E3B341">✓</text>
    </g>
    <g>
      <rect x="720" y="588" width="370" height="86" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="744" y="622" font-size="17" font-weight="700" fill="#F0CD66">REVIEW SESSION 4</text>
      <text x="744" y="650" font-size="13" fill="#8A7333">separate session · no shared context</text>
      <text x="1066" y="638" text-anchor="end" font-size="20" fill="#E3B341">✓</text>
    </g>
    <g>
      <rect x="720" y="684" width="370" height="86" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.55" stroke-width="1.5"/>
      <text x="744" y="718" font-size="17" font-weight="700" fill="#F0CD66">REVIEW SESSION 5</text>
      <text x="744" y="746" font-size="13" fill="#8A7333">separate session · no shared context</text>
      <text x="1066" y="734" text-anchor="end" font-size="20" fill="#E3B341">✓</text>
    </g>

    <!-- isolation wall between factory and inspectors -->
    <line x1="690" y1="300" x2="690" y2="770" stroke="#E3B341" stroke-opacity="0.3" stroke-width="2" stroke-dasharray="3 7"/>

    <!-- each session reads the factory independently -->
    <path d="M640 420 H690" fill="none" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#arrow4)"/>

    <!-- consensus -> trust -->
    <line x1="1090" y1="343" x2="1180" y2="500" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
    <line x1="1090" y1="439" x2="1180" y2="505" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
    <line x1="1090" y1="535" x2="1180" y2="510" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
    <line x1="1090" y1="631" x2="1180" y2="515" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>
    <line x1="1090" y1="727" x2="1180" y2="520" stroke="#E3B341" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5"/>

    <g class="glow">
      <rect x="1180" y="440" width="320" height="160" rx="12" fill="#E3B341" fill-opacity="0.08" stroke="#E3B341" stroke-opacity="0.8" stroke-width="2"/>
    </g>
    <text x="1340" y="500" text-anchor="middle" font-size="22" font-weight="700" fill="#F0CD66">TRUST PRODUCED</text>
    <text x="1340" y="532" text-anchor="middle" font-size="14" fill="#C9A23B">independence purchased</text>
    <text x="1340" y="556" text-anchor="middle" font-size="14" fill="#C9A23B">structurally, not simulated</text>
    <text x="1340" y="582" text-anchor="middle" font-size="14" fill="#B8902F">isolation is real</text>
  </g>

  <text class="ink" x="720" y="800" font-size="13" fill="#8A7333">tool choice is an architecture decision · the environment guarantees the isolation</text>

  <line x1="60" y1="912" x2="1540" y2="912" stroke="#E3B341" stroke-opacity="0.2" stroke-width="1"/>
  <text class="ink" x="60" y="946" font-size="14" fill="#7A6428" letter-spacing="2">NECO-1 · U5 PIP · STATUS: IN FABRICATION · NOT YET PUBLIC</text>

  <g class="ink">
    <rect x="1318" y="922" width="222" height="40" rx="6" fill="none" stroke="#E3B341" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="1429" y="949" text-anchor="middle" font-size="18" font-weight="700" fill="#E3B341" letter-spacing="4">CONCEPT RENDER</text>
  </g>
</svg>
