<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img"
     aria-label="PIP open protocol PSP — an openly adoptable standard specifying how primitives are described, invoked, and verified. Concept render.">
  <defs>
    <style>
      .ink{font-family:'Courier New',ui-monospace,monospace;}
      .glow{filter:drop-shadow(0 0 6px rgba(227,179,65,.35));}
    </style>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E3B341" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C1018"/>
      <stop offset="1" stop-color="#070A10"/>
    </linearGradient>
    <marker id="arrow3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#E3B341"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg3)"/>
  <rect width="1600" height="1000" fill="url(#grid3)"/>
  <rect x="20" y="20" width="1560" height="960" fill="none" stroke="#E3B341" stroke-opacity="0.35" stroke-width="1.5"/>
  <rect x="34" y="34" width="1532" height="932" fill="none" stroke="#E3B341" stroke-opacity="0.12" stroke-width="1" stroke-dasharray="3 6"/>

  <text class="ink" x="800" y="560" text-anchor="middle" transform="rotate(-18 800 560)"
        font-size="190" font-weight="700" fill="#E3B341" fill-opacity="0.05" letter-spacing="22">IN FAB</text>

  <text class="ink" x="60" y="92" font-size="34" font-weight="700" fill="#E3B341" letter-spacing="4">PIP — PRIMITIVE INFRASTRUCTURE PLATFORM</text>
  <text class="ink" x="62" y="124" font-size="18" fill="#9A7B2E" letter-spacing="3">U5 · BUS-16 · PSP — OPEN PROTOCOL SPEC</text>
  <line x1="60" y1="142" x2="1540" y2="142" stroke="#E3B341" stroke-opacity="0.25" stroke-width="1"/>

  <!-- spec document -->
  <g class="glow">
    <rect x="80" y="200" width="440" height="600" rx="10" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.7" stroke-width="2"/>
  </g>
  <text class="ink" x="110" y="252" font-size="24" font-weight="700" fill="#F0CD66" letter-spacing="2">PIP STANDARD PROTOCOL</text>
  <text class="ink" x="110" y="280" font-size="15" fill="#B8902F">specification · published openly</text>
  <line x1="110" y1="300" x2="490" y2="300" stroke="#E3B341" stroke-opacity="0.3"/>

  <g class="ink" font-size="17">
    <!-- three spec clauses: described, invoked, verified -->
    <rect x="110" y="328" width="380" height="120" rx="8" fill="none" stroke="#E3B341" stroke-opacity="0.4"/>
    <text x="130" y="360" font-weight="700" fill="#E3B341">§1  DESCRIBED</text>
    <text x="130" y="388" font-size="14" fill="#8A7333">how a primitive is described —</text>
    <text x="130" y="410" font-size="14" fill="#8A7333">metadata, versioned ID,</text>
    <text x="130" y="432" font-size="14" fill="#8A7333">source-of-truth document</text>

    <rect x="110" y="460" width="380" height="120" rx="8" fill="none" stroke="#E3B341" stroke-opacity="0.4"/>
    <text x="130" y="492" font-weight="700" fill="#E3B341">§2  INVOKED</text>
    <text x="130" y="520" font-size="14" fill="#8A7333">how a primitive is invoked —</text>
    <text x="130" y="542" font-size="14" fill="#8A7333">metered, settled per call,</text>
    <text x="130" y="564" font-size="14" fill="#8A7333">composition-aware</text>

    <rect x="110" y="592" width="380" height="120" rx="8" fill="none" stroke="#E3B341" stroke-opacity="0.4"/>
    <text x="130" y="624" font-weight="700" fill="#E3B341">§3  VERIFIED</text>
    <text x="130" y="652" font-size="14" fill="#8A7333">how a primitive is verified —</text>
    <text x="130" y="674" font-size="14" fill="#8A7333">five isolated review sessions,</text>
    <text x="130" y="696" font-size="14" fill="#8A7333">consensus before it ships</text>
  </g>
  <text class="ink" x="110" y="752" font-size="13" fill="#7A6428">written for adversarial readers —</text>
  <text class="ink" x="110" y="772" font-size="13" fill="#7A6428">every ambiguity is a future incompatibility</text>

  <!-- open adoption fan-out -->
  <text class="ink" x="640" y="240" font-size="22" font-weight="700" fill="#E3B341" letter-spacing="3">OPENLY ADOPTABLE STANDARD</text>
  <text class="ink" x="642" y="266" font-size="14" fill="#B8902F">other vendors can implement PSP themselves</text>

  <g class="ink">
    <!-- hub -->
    <g class="glow">
      <rect x="660" y="430" width="220" height="120" rx="10" fill="#E3B341" fill-opacity="0.08" stroke="#E3B341" stroke-opacity="0.8" stroke-width="2"/>
    </g>
    <text x="770" y="478" text-anchor="middle" font-size="22" font-weight="700" fill="#F0CD66">PSP SPEC</text>
    <text x="770" y="506" text-anchor="middle" font-size="14" fill="#C9A23B">the reference</text>
    <text x="770" y="528" text-anchor="middle" font-size="14" fill="#C9A23B">not the gatekeeper</text>

    <!-- implementer nodes -->
    <line x1="880" y1="470" x2="1130" y2="350" stroke="#E3B341" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow3)"/>
    <line x1="880" y1="490" x2="1130" y2="490" stroke="#E3B341" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow3)"/>
    <line x1="880" y1="510" x2="1130" y2="630" stroke="#E3B341" stroke-opacity="0.45" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow3)"/>

    <rect x="1140" y="312" width="300" height="78" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="1160" y="344" font-size="17" font-weight="700" fill="#F0CD66">VENDOR IMPLEMENTATION</text>
    <text x="1160" y="370" font-size="14" fill="#8A7333">implements PSP independently</text>

    <rect x="1140" y="451" width="300" height="78" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="1160" y="483" font-size="17" font-weight="700" fill="#F0CD66">VENDOR IMPLEMENTATION</text>
    <text x="1160" y="509" font-size="14" fill="#8A7333">implements PSP independently</text>

    <rect x="1140" y="590" width="300" height="78" rx="8" fill="#0A0E16" stroke="#E3B341" stroke-opacity="0.5" stroke-width="1.5"/>
    <text x="1160" y="622" font-size="17" font-weight="700" fill="#F0CD66">VENDOR IMPLEMENTATION</text>
    <text x="1160" y="648" font-size="14" fill="#8A7333">implements PSP independently</text>
  </g>

  <!-- moat note -->
  <g class="glow">
    <rect x="640" y="700" width="800" height="110" rx="10" fill="none" stroke="#E3B341" stroke-opacity="0.6" stroke-width="1.5" stroke-dasharray="9 7"/>
  </g>
  <text class="ink" x="670" y="744" font-size="18" font-weight="700" fill="#E3B341" letter-spacing="2">THE MOAT IS THE PROTOCOL</text>
  <text class="ink" x="670" y="772" font-size="15" fill="#B8902F">platforms get displaced; protocols get adopted —</text>
  <text class="ink" x="670" y="796" font-size="15" fill="#B8902F">so the ecosystem outlives any single vendor</text>

  <line x1="60" y1="912" x2="1540" y2="912" stroke="#E3B341" stroke-opacity="0.2" stroke-width="1"/>
  <text class="ink" x="60" y="946" font-size="14" fill="#7A6428" letter-spacing="2">NECO-1 · U5 PIP · STATUS: IN FABRICATION · NOT YET PUBLIC</text>

  <g class="ink">
    <rect x="1318" y="922" width="222" height="40" rx="6" fill="none" stroke="#E3B341" stroke-opacity="0.6" stroke-width="1.5"/>
    <text x="1429" y="949" text-anchor="middle" font-size="18" font-weight="700" fill="#E3B341" letter-spacing="4">CONCEPT RENDER</text>
  </g>
</svg>
